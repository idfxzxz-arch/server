<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setup Admin - idkcenter</title>
    <script>
        (function () {
            const saved = localStorage.getItem('idkcenter-theme');
            const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
            document.documentElement.dataset.theme = saved || (prefersDark ? 'dark' : 'light');
        })();
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            color-scheme: light;
            --page-start: #f8fafc;
            --page-end: #eef4fb;
            --page-accent: rgba(37, 99, 235, 0.06);
            --card-bg: rgba(255, 255, 255, 0.9);
            --border: #e2e8f0;
            --field-bg: #f8fafc;
            --field-border: #cbd5e1;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --brand-bg: #111827;
            --brand-text: #ffffff;
            --accent: #2563eb;
            --accent-strong: #1d4ed8;
            --shadow: 0 18px 50px rgba(15, 23, 42, 0.1);
        }

        html[data-theme="dark"] {
            color-scheme: dark;
            --page-start: #0b1018;
            --page-end: #111827;
            --page-accent: rgba(96, 165, 250, 0.1);
            --card-bg: rgba(17, 24, 39, 0.9);
            --border: #263244;
            --field-bg: #0b1220;
            --field-border: #334155;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --brand-bg: #60a5fa;
            --brand-text: #0b1220;
            --accent: #60a5fa;
            --accent-strong: #3b82f6;
            --shadow: 0 18px 42px rgba(0, 0, 0, 0.28);
        }

        body {
            font-family: 'Inter', sans-serif;
            background:
                linear-gradient(90deg, var(--page-accent), transparent 32%),
                linear-gradient(180deg, var(--page-start) 0%, var(--page-end) 100%);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 1rem;
        }

        .card {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 8px;
            border: 1px solid var(--border);
            width: 100%;
            max-width: 430px;
            text-align: center;
            backdrop-filter: blur(18px);
            box-shadow: var(--shadow);
        }

        .brand-mark {
            width: 52px;
            height: 52px;
            border-radius: 8px;
            display: grid;
            place-items: center;
            margin: 0 auto 1.25rem;
            background: var(--brand-bg);
            color: var(--brand-text);
            font-weight: 800;
            box-shadow: 0 12px 24px rgba(20, 184, 166, 0.22);
        }

        h2 {
            margin-top: 0;
            margin-bottom: 20px;
            font-weight: 750;
        }

        p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            background: var(--field-bg);
            border: 1px solid var(--field-border);
            color: var(--text-main);
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 1rem;
        }

        input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.14);
        }

        button {
            width: 100%;
            padding: 12px;
            background: var(--accent);
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background: var(--accent-strong);
            transform: translateY(-1px);
        }

        .error {
            color: #fda4af;
            font-size: 0.9rem;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="brand-mark">idk</div>
        <h2>Siapkan idkcenter</h2>
        <p>Buat akun administrator pertama untuk mengamankan pusat kendali server ini.</p>

        <form id="setupForm">
            <input type="text" id="username" placeholder="Username (e.g. admin)" required>
            <input type="password" id="password" placeholder="New Password" required minlength="4">
            <input type="password" id="confirm_password" placeholder="Confirm Password" required minlength="4">
            <button type="submit" id="btn-submit">Buat Akun & Masuk</button>
            <div class="error" id="error-msg"></div>
        </form>
    </div>

    <script>
        document.getElementById('setupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const confirm = document.getElementById('confirm_password').value;
            const btn = document.getElementById('btn-submit');
            const err = document.getElementById('error-msg');

            if (pass !== confirm) {
                err.innerText = "Konfirmasi password tidak sama.";
                err.style.display = 'block';
                return;
            }

            btn.innerText = "Menyimpan...";
            err.style.display = 'none';

            try {
                const res = await fetch('/api/setup-admin', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, password: pass })
                });
                const data = await res.json();

                if (data.success) {
                    window.location.href = '/'; // Go to dashboard
                } else {
                    err.innerText = data.error || "Setup failed";
                    err.style.display = 'block';
                    btn.innerText = "Buat Akun & Masuk";
                }
            } catch (e) {
                err.innerText = "Koneksi bermasalah";
                err.style.display = 'block';
                btn.innerText = "Buat Akun & Masuk";
            }
        });
    </script>
</body>

</html>
